spring.application.name=Gateway
server.port=8080

#Eureka
eureka.client.service-url.defaulZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

#Gateway-debug
logging.level.org.springframework.cloud.gateway=DEBUG

#Enrutamientos
#Paciente

spring.cloud.gateway.server.webflux.routes[0].id=paciente-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://Paciente
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/pacientes/**

#Atencion
spring.cloud.gateway.server.webflux.routes[1].id=atencion-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://Atencion
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/atenciones/**